name: Build pipa images
on:
  push:
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out build configurations
        uses: actions/checkout@v4

      - name: Create artifact directory
        run: mkdir out

      - name: Substitute placeholders in configs
        run: find . -type f -name '*.cfg' -exec sed -i "s|HOME|$HOME|;s|NPROC|$(nproc)|" {} +

      - name: Install pmbootstrap from git
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          pmbootstrap --version

      - name: Patch pmbootstrap
        run: |
          sed -i 's/strict: bool = True/strict: bool = False/' pmbootstrap/pmb/build/_package.py
          sed -i 's/strict: bool = True/strict: bool = False/' pmbootstrap/pmb/build/backend.py

      - name: Set up pmaports
        run: |
          yes "" | pmbootstrap init
          cd ~/.local/var/pmbootstrap/cache_git/pmaports
          git remote add pipa https://github.com/pipa-project/pmaports-pipa.git
          DEFAULT_BRANCH=$(git remote show pipa | awk '/HEAD branch/ {print $NF}')
          git fetch pipa $DEFAULT_BRANCH
          git reset --hard pipa/$DEFAULT_BRANCH

      - name: Build xiaomi-pipa image
        run: |
          cp xiaomi-pipa.cfg ~/.config/pmbootstrap_v3.cfg
          yes | pmbootstrap install --password 147147
          pmbootstrap export
          cp /tmp/postmarketOS-export/*.img out/ 2>/dev/null || cp /tmp/postmarketOS-export/xiaomi-pipa* out/ 2>/dev/null || ls /tmp/postmarketOS-export/
          ls -lh out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi-pipa-console
          path: out/*.img*
          retention-days: 7
