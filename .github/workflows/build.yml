name: Build pipa images
on:
  push:
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out build configurations
        uses: actions/checkout@v4

      - name: Create artifact directory
        run: mkdir out

      - name: Install pmbootstrap from git
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          sed -i 's/strict: bool = True/strict: bool = False/g' pmbootstrap/pmb/build/_package.py
          sed -i 's/strict: bool = True/strict: bool = False/g' pmbootstrap/pmb/build/backend.py
          pmbootstrap --version

      - name: Copy config and init
        run: |
          mkdir -p ~/.config
          cp xiaomi-pipa.cfg ~/.config/pmbootstrap_v3.cfg
          yes "" | pmbootstrap init

      - name: Build and install
        run: |
          cp xiaomi-pipa.cfg ~/.config/pmbootstrap_v3.cfg
          pmbootstrap install --password 147147
          pmbootstrap export
          ls -la /tmp/postmarketOS-export/
          cp -r /tmp/postmarketOS-export/* out/


      - name: Configure WiFi auto-connect
        run: |
          mkdir -p /tmp/pmroot
          # Mount the rootfs from export
          sudo mount /tmp/postmarketOS-export/xiaomi-pipa.img /tmp/pmroot 2>/dev/null || true
          # Create wpa_supplicant config
          sudo mkdir -p /tmp/pmroot/etc/wpa_supplicant
          echo 'network={
          ssid="GoForNetwork-bzbk007"
          psk="aA114514@"
          key_mgmt=WPA-PSK
          }' | sudo tee /tmp/pmroot/etc/wpa_supplicant/wpa_supplicant.conf
          # Create auto-connect script
          echo '#!/bin/sh
          ip link set wlan0 up
          wpa_supplicant -B -i wlan0 -c /etc/wpa_supplicant/wpa_supplicant.conf
          sleep 3
          udhcpc -i wlan0
          ' | sudo tee /tmp/pmroot/etc/local.d/wifi-autoconnect.start
          sudo chmod +x /tmp/pmroot/etc/local.d/wifi-autoconnect.start
          sudo umount /tmp/pmroot 2>/dev/null
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi-pipa-console
          path: out/
          retention-days: 7
